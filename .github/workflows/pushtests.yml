name: Sportsipy push tests

on: [push, pull_request]

jobs:
  test:
    name: Test and lint code
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
        operating-system: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Install dependencies
      run: |
        uv pip install --system -r requirements.txt -r requirements-dev.txt
    - name: Build package
      run: |
        python -m build
    - name: Check formatting with Ruff
      run: |
        ruff format --check .
    - name: Lint with ruff
      run: |
        ruff check sportsipy/ tests/
    - name: Validate documentation links and wording
      run: |
        python scripts/check_docs_links.py
    - name: Type check with pyright (non-blocking)
      continue-on-error: true
      run: |
        pyright sportsipy/
    - name: Run unit and integration tests with pytest
      run: |
        pytest tests/unit/ tests/integration/ --cov=sportsipy --cov-report=term-missing
    - name: Upload coverage to Codecov
      if: matrix.operating-system == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
